<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
        <link rel="icon" href="/favicon.ico" sizes="32x32">
        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <link rel="stylesheet" href="%sveltekit.assets%/immutable/css/ehui-2026-06-02_02.27.min.css" />
        <link rel="stylesheet" href="%sveltekit.assets%/immutable/themes/auto-flight-fdark-2026-06-02_02.27.min.css" />
		<script>
			if (window.localStorage) {
				const theme = window.localStorage.getItem("physicseoyproj:theme");
				if (theme == "light") {
					document.documentElement.classList.add("theme-flight");
				} else if (theme == "dark") {
					document.documentElement.classList.add("theme-fdark");
				}
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
